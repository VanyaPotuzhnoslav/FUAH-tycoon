<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUAH Tycoon Online</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .game-container { background: white; padding: 25px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        .stats { background: #fff9c4; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; border: 2px solid #fbc02d; }
        .shop-container { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; min-height: 50px; }
        .building-card { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .buy-btn { background: #4caf50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; width: 100%; }
        .admin-panel { display: none; margin-top: 20px; padding: 15px; background: #ffebee; border: 2px dashed #f44336; border-radius: 12px; text-align: left; }
        .admin-panel input { width: 90%; margin-bottom: 8px; padding: 5px; }
        .sync-section { margin-top: 20px; background: #e3f2fd; padding: 15px; border-radius: 12px; }
        .btn-blue { background: #2196f3; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin: 5px; }
        hr { border: 0; border-top: 1px solid #ccc; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>FUAH Tycoon 🌐</h1>
        
        <div class="stats">
            Баланс: <span id="balance">1000</span> FUAH<br>
            Дохід: <span id="income">0</span> FUAH/день
        </div>

        <h3>Магазин</h3>
        <div id="shop" class="shop-container">Завантаження магазину...</div>

        <div class="sync-section">
            <input type="text" id="syncCode" placeholder="Ваш код синхронізації"> <br>
            <button class="btn-blue" id="btnSave">Зберегти хмару</button>
            <button class="btn-blue" id="btnLoad">Завантажити</button>
        </div>

        <button id="adminTrigger" style="margin-top: 20px; opacity: 0.1; border: none; background: none; cursor: pointer;">Адмін</button>

        <div id="adminPanel" class="admin-panel">
            <h4>Панель Лахазавра 🦖</h4>
            <input type="text" id="newBuildName" placeholder="Назва будівлі">
            <input type="number" id="newBuildPrice" placeholder="Ціна">
            <input type="number" id="newBuildIncome" placeholder="Дохід">
            <button onclick="window.addNewBuilding()">Додати будівлю для ВСІХ</button>
            <hr>
            <input type="text" id="targetCode" placeholder="Код гравця">
            <input type="number" id="amountChange" placeholder="Сума (напр. 5000)">
            <button onclick="window.editPlayerBalance()">Змінити баланс гравця</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCd7p3gyOGqlQZsddgkEt4sdcwWPZnCM5M",
            authDomain: "fuahtycoon.firebaseapp.com",
            projectId: "fuahtycoon",
            storageBucket: "fuahtycoon.firebasestorage.app",
            messagingSenderId: "507303452654",
            appId: "1:507303452654:web:75b6ec2cb33d05fa95b8ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Стан гри
        let gameState = { balance: 1000, income: 0, lastLogin: Date.now() };
        let availableBuildings = [];

        // --- ФУНКЦІЇ ОНОВЛЕННЯ ЕКРАНУ ---
        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(gameState.balance);
            document.getElementById('income').innerText = gameState.income;
        }

        function renderShop() {
            const shopEl = document.getElementById('shop');
            shopEl.innerHTML = '';
            availableBuildings.forEach((b, index) => {
                const card = document.createElement('div');
                card.className = 'building-card';
                card.innerHTML = `<b>${b.name}</b><br>Ціна: ${b.price} | +${b.income}/дн<br>`;
                const btn = document.createElement('button');
                btn.className = 'buy-btn';
                btn.innerText = 'Купити';
                btn.onclick = () => buyBuilding(b);
                card.appendChild(btn);
                shopEl.appendChild(card);
            });
        }

        function buyBuilding(b) {
            if (gameState.balance >= b.price) {
                gameState.balance -= b.price;
                gameState.income += b.income;
                updateUI();
            } else { alert("Бракує FUAH!"); }
        }

        // --- РОБОТА З FIREBASE ---

        // 1. Отримання будівель (в реальному часі)
        onValue(ref(db, 'global_buildings'), (snapshot) => {
            const data = snapshot.val();
            availableBuildings = data ? Object.values(data) : [];
            renderShop();
        });

        // 2. Збереження
        window.saveGame = () => {
            const code = document.getElementById('syncCode').value;
            if (!code) return alert("Введіть код!");
            gameState.lastLogin = Date.now();
            set(ref(db, 'players/' + code), gameState)
                .then(() => alert("Прогрес у хмарі!"));
        };

        // 3. Завантаження (з офлайн-доходом)
        window.loadGame = async () => {
            const code = document.getElementById('syncCode').value;
            const snapshot = await get(ref(db, 'players/' + code));
            if (snapshot.exists()) {
                const loaded = snapshot.val();
                const now = Date.now();
                const days = (now - loaded.lastLogin) / (24 * 60 * 60 * 1000);
                const earnings = Math.floor(days * loaded.income);
                
                gameState = loaded;
                gameState.balance += earnings;
                gameState.lastLogin = now;
                updateUI();
                alert(`Успішно! Дохід за час відсутності: ${earnings} FUAH`);
            } else { alert("Код не знайдено"); }
        };

        // --- АДМІНКА ---
        window.addNewBuilding = () => {
            const name = document.getElementById('newBuildName').value;
            const price = parseInt(document.getElementById('newBuildPrice').value);
            const income = parseInt(document.getElementById('newBuildIncome').value);
            if (name && price && income) {
                const newId = Date.now();
                set(ref(db, 'global_buildings/' + newId), { name, price, income });
                alert("Будівля додана в глобальну базу!");
            }
        };

        window.editPlayerBalance = async () => {
            const code = document.getElementById('targetCode').value;
            const amount = parseFloat(document.getElementById('amountChange').value);
            const pRef = ref(db, 'players/' + code);
            const snap = await get(pRef);
            if (snap.exists()) {
                let data = snap.val();
                data.balance += amount;
                update(pRef, { balance: data.balance });
                alert("Баланс гравця " + code + " змінено!");
            }
        };

        // Кнопки
        document.getElementById('btnSave').onclick = window.saveGame;
        document.getElementById('btnLoad').onclick = window.loadGame;
        document.getElementById('adminTrigger').onclick = () => {
            if(prompt("Пароль:") === "Lahazavr88@99") document.getElementById('adminPanel').style.display='block';
        };

        updateUI();
    </script>
</body>
</html>
