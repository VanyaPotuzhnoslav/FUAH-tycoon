<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUAH Tycoon: Visual & Leaderboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .game-container { background: white; padding: 25px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 500px; vertical-align: top; }
        .sidebar { display: inline-block; width: 250px; margin-left: 20px; vertical-align: top; }
        
        .stats { background: #fff9c4; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; border: 2px solid #fbc02d; }
        
        /* Сітка */
        .grid-container { display: grid; gap: 5px; margin: 20px auto; background: #ddd; padding: 10px; border-radius: 10px; justify-content: center; }
        .cell { 
            width: 60px; height: 60px; background: #fff; border: 1px solid #ccc; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; position: relative;
        }
        .cell img { width: 100%; height: 100%; object-fit: cover; }
        .cell:hover { background: #f0f0f0; }

        /* Магазин */
        .shop-container { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
        .building-card { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: left; display: flex; align-items: center; gap: 10px; position: relative; }
        .build-icon { width: 50px; height: 50px; border-radius: 5px; background: #eee; object-fit: cover; }
        .buy-btn { background: #4caf50; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; flex-grow: 1; }
        .buy-btn.selected { background: #2196f3; }

        /* Лідерборд */
        .leaderboard { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: left; }
        .leader-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        .leader-rank { font-weight: bold; color: #fbc02d; margin-right: 10px; }

        /* Адмінка */
        .admin-panel { display: none; margin-top: 20px; padding: 15px; background: #ffebee; border: 2px dashed #f44336; border-radius: 12px; text-align: left; }
        .admin-panel input { width: 92%; margin-bottom: 8px; padding: 6px; border-radius: 4px; border: 1px solid #ccc; }
        
        .sync-section { margin-top: 20px; background: #e3f2fd; padding: 15px; border-radius: 12px; }
        .btn-blue { background: #2196f3; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>FUAH Tycoon 🌐</h1>
        
        <div class="stats">
            Баланс: <span id="balance">1000</span> FUAH | Дохід: <span id="income">0</span>/дн<br>
            <small>Швидкість: x<span id="timeMult">1.0</span></small>
        </div>

        <div id="grid" class="grid-container"></div>
        <button class="btn-blue" id="btnExpand">Розширити поле (Земля)</button>

        <h3>Магазин</h3>
        <div id="shop" class="shop-container"></div>

        <div class="sync-section">
            <input type="text" id="userName" placeholder="Ваш Нікнейм">
            <input type="text" id="syncCode" placeholder="Ваш Секретний Код"> <br>
            <button class="btn-blue" id="btnSave">Зберегти прогрес</button>
            <button class="btn-blue" id="btnLoad">Завантажити за кодом</button>
        </div>

        <button id="adminTrigger" style="margin-top:20px; opacity:0.1; border:none; background:none;">Адмін</button>

        <div id="adminPanel" class="admin-panel">
            <h4>Панель Лахазавра 🦖</h4>
            <input type="text" id="newBuildName" placeholder="Назва">
            <input type="number" id="newBuildPrice" placeholder="Ціна">
            <input type="number" id="newBuildIncome" placeholder="Дохід">
            <input type="text" id="newBuildImg" placeholder="URL картинки (https://...)">
            <label><input type="checkbox" id="isOneTime"> Одноразова</label>
            <button id="btnAddBuild" style="width:100%; margin-top:10px; background:#f44336; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Створити будівлю</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="leaderboard">
            <h3>🏆 Лідерборд</h3>
            <div id="leaderList">Завантаження...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCd7p3gyOGqlQZsddgkEt4sdcwWPZnCM5M",
            authDomain: "fuahtycoon.firebaseapp.com",
            projectId: "fuahtycoon",
            storageBucket: "fuahtycoon.firebasestorage.app",
            messagingSenderId: "507303452654",
            appId: "1:507303452654:web:75b6ec2cb33d05fa95b8ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let gameState = { 
            nickname: "", balance: 1000, income: 0, timeMultiplier: 1.0, 
            purchasedIds: [], gridSize: 6, placedBuildings: {}, lastLogin: Date.now() 
        };
        let globalBuildings = {};
        let selectedBuild = null;

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(gameState.balance);
            document.getElementById('income').innerText = gameState.income;
            document.getElementById('timeMult').innerText = (1 / gameState.timeMultiplier).toFixed(1);
            renderGrid();
            renderShop();
        }

        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${gameState.gridSize}, 60px)`;
            gridEl.innerHTML = '';

            for (let i = 0; i < gameState.gridSize * gameState.gridSize; i++) {
                const key = `${Math.floor(i / gameState.gridSize)}-${i % gameState.gridSize}`;
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (gameState.placedBuildings[key]) {
                    const img = document.createElement('img');
                    img.src = gameState.placedBuildings[key].img || 'https://via.placeholder.com/60?text=FUAH';
                    cell.appendChild(img);
                }
                cell.onclick = () => placeBuilding(key);
                gridEl.appendChild(cell);
            }
        }

        function renderShop() {
            const shopEl = document.getElementById('shop');
            shopEl.innerHTML = '';
            for (let id in globalBuildings) {
                const b = globalBuildings[id];
                if (b.isOneTime && gameState.purchasedIds?.includes(id)) continue;

                const card = document.createElement('div');
                card.className = 'building-card';
                card.innerHTML = `<img src="${b.img || 'https://via.placeholder.com/50'}" class="build-icon">
                                 <div><b>${b.name}</b><br><small>${b.price} FUAH | +${b.income}</small></div>`;
                
                const btn = document.createElement('button');
                btn.className = 'buy-btn' + (selectedBuild?.id === id ? ' selected' : '');
                btn.innerText = selectedBuild?.id === id ? 'Став на поле!' : 'Вибрати';
                btn.onclick = () => { selectedBuild = { ...b, id }; renderShop(); };
                
                card.appendChild(btn);
                shopEl.appendChild(card);
            }
        }

        function placeBuilding(key) {
            if (!selectedBuild) return;
            if (gameState.placedBuildings[key]) return alert("Зайнято!");
            if (gameState.balance < selectedBuild.price) return alert("Бракує грошей!");

            gameState.balance -= selectedBuild.price;
            gameState.income += (selectedBuild.income || 0);
            gameState.placedBuildings[key] = { name: selectedBuild.name, img: selectedBuild.img };
            
            if (selectedBuild.isOneTime) {
                if (!gameState.purchasedIds) gameState.purchasedIds = [];
                gameState.purchasedIds.push(selectedBuild.id);
            }
            selectedBuild = null;
            updateUI();
        }

        // ЛІДЕРБОРД
        onValue(ref(db, 'players'), (snap) => {
            const players = snap.val();
            const listEl = document.getElementById('leaderList');
            listEl.innerHTML = '';
            
            let sorted = [];
            for(let id in players) sorted.push(players[id]);
            sorted.sort((a, b) => b.balance - a.balance);

            sorted.slice(0, 10).forEach((p, index) => {
                listEl.innerHTML += `<div class="leader-item">
                    <span><span class="leader-rank">#${index+1}</span> ${p.nickname || 'Анонім'}</span>
                    <b>${Math.floor(p.balance)}</b>
                </div>`;
            });
        });

        // БАЗОВІ ФУНКЦІЇ
        onValue(ref(db, 'global_buildings'), (snap) => { globalBuildings = snap.val() || {}; renderShop(); });

        document.getElementById('btnSave').onclick = () => {
            const code = document.getElementById('syncCode').value;
            const nick = document.getElementById('userName').value;
            if (!code || !nick) return alert("Введіть і нік, і код!");
            gameState.nickname = nick;
            gameState.lastLogin = Date.now();
            set(ref(db, 'players/' + code), gameState).then(() => alert("Прогрес збережено!"));
        };

        document.getElementById('btnLoad').onclick = async () => {
            const code = document.getElementById('syncCode').value;
            const snap = await get(ref(db, 'players/' + code));
            if (snap.exists()) {
                gameState = snap.val();
                document.getElementById('userName').value = gameState.nickname || "";
                updateUI();
            } else alert("Невірний код!");
        };

        document.getElementById('btnAddBuild').onclick = () => {
            const name = document.getElementById('newBuildName').value;
            const price = parseInt(document.getElementById('newBuildPrice').value);
            const img = document.getElementById('newBuildImg').value;
            if (name && price) {
                set(ref(db, 'global_buildings/b_' + Date.now()), { 
                    name, price, income: parseInt(document.getElementById('newBuildIncome').value) || 0,
                    img, isOneTime: document.getElementById('isOneTime').checked 
                });
                alert("Будівлю створено!");
            }
        };

        document.getElementById('adminTrigger').onclick = () => {
            if(prompt("Пароль:") === "Lahazavr88@99") document.getElementById('adminPanel').style.display = 'block';
        };

        updateUI();
    </script>
</body>
</html>
