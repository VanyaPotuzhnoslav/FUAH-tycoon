<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>FUAH Tycoon: Fixed Save</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        .game-container { background: white; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .sync-section { margin-top: 20px; padding: 10px; background: #e3f2fd; border-radius: 10px; }
        input { display: block; margin: 5px auto; padding: 8px; }
        .btn { padding: 10px 20px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>FUAH Tycoon 🌐</h1>
    <div id="balance-display">Баланс: <span id="balance">1000</span> FUAH</div>
    
    <div class="sync-section">
        <input type="text" id="userName" placeholder="Твій Нікнейм">
        <input type="text" id="syncCode" placeholder="Секретний Код">
        <button class="btn" id="btnSave">💾 ЗБЕРЕГТИ</button>
        <button class="btn" id="btnLoad">📂 ЗАВАНТАЖИТИ</button>
    </div>
</div>

<script type="module">
    // 1. ПІДКЛЮЧЕННЯ FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCd7p3gyOGqlQZsddgkEt4sdcwWPZnCM5M",
        authDomain: "fuahtycoon.firebaseapp.com",
        projectId: "fuahtycoon",
        storageBucket: "fuahtycoon.firebasestorage.app",
        messagingSenderId: "507303452654",
        appId: "1:507303452654:web:75b6ec2cb33d05fa95b8ff"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 2. СТАН ГРИ (Тут ваші дані)
    let gameState = { 
        nickname: "", 
        balance: 1000, 
        income: 0, 
        gridSize: 6, 
        placedBuildings: {}, 
        lastLogin: Date.now() 
    };

    // 3. ФУНКЦІЯ ЗБЕРЕЖЕННЯ (ВСТАВЛЯТИ СЮДИ)
    const sBtn = document.getElementById('btnSave');
    if (sBtn) {
        sBtn.onclick = function() {
            const nickField = document.getElementById('userName');
            const codeField = document.getElementById('syncCode');
            
            const nick = nickField.value.trim();
            const code = codeField.value.trim();

            if (nick === "" || code === "") {
                alert("Введи Нік та Код!");
                return;
            }

            // Формуємо чисті дані
            gameState.nickname = nick;
            gameState.lastLogin = Date.now();

            const dataToSave = {
                nickname: String(gameState.nickname),
                balance: Number(gameState.balance),
                income: Number(gameState.income),
                gridSize: Number(gameState.gridSize),
                placedBuildings: gameState.placedBuildings || {},
                lastLogin: gameState.lastLogin
            };

            console.log("Відправка:", dataToSave);

            set(ref(db, 'players/' + code), dataToSave)
                .then(() => alert("✅ ЗБЕРЕЖЕНО!"))
                .catch((err) => alert("❌ ПОМИЛКА: " + err.message));
        };
    }

    // 4. ФУНКЦІЯ ЗАВАНТАЖЕННЯ
    const lBtn = document.getElementById('btnLoad');
    if (lBtn) {
        lBtn.onclick = async function() {
            const code = document.getElementById('syncCode').value.trim();
            if (!code) return alert("Введи код!");

            const snap = await get(ref(db, 'players/' + code));
            if (snap.exists()) {
                gameState = snap.val();
                document.getElementById('userName').value = gameState.nickname;
                document.getElementById('balance').innerText = Math.floor(gameState.balance);
                alert("📂 ЗАВАНТАЖЕНО!");
            } else {
                alert("Код не знайдено!");
            }
        };
    }
</script>

</body>
</html>
