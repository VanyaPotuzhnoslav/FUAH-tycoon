<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUAH Tycoon: Heavy Fix</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .game-container { background: white; padding: 25px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; }
        .stats { background: #fff9c4; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; border: 2px solid #fbc02d; }
        .grid-container { display: grid; gap: 4px; margin: 15px auto; background: #ccc; padding: 8px; border-radius: 10px; width: fit-content; }
        .cell { width: 55px; height: 55px; background: #fff; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #bbb; }
        .cell img { width: 100%; height: 100%; object-fit: cover; }
        .sync-section { background: #e3f2fd; padding: 15px; border-radius: 15px; margin-top: 15px; }
        .sync-section input { width: 85%; margin-bottom: 8px; padding: 8px; border-radius: 6px; border: 1px solid #90caf9; display: block; margin-left: auto; margin-right: auto; }
        .btn { background: #2196f3; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #1976d2; }
        .shop-container { max-height: 200px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; }
        .building-card { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>FUAH Tycoon 🌐</h1>
        
        <div class="stats">
            💰 Баланс: <span id="balance">1000</span> FUAH | 📈 Дохід: <span id="income">0</span>
        </div>

        <div id="grid" class="grid-container"></div>

        <div class="sync-section">
            <input type="text" id="userName" placeholder="Твій Нікнейм">
            <input type="text" id="syncCode" placeholder="Секретний Код">
            <button class="btn" id="btnSave">💾 ЗБЕРЕГТИ</button>
            <button class="btn" id="btnLoad">📂 ЗАВАНТАЖИТИ</button>
        </div>

        <div id="shop" class="shop-container"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCd7p3gyOGqlQZsddgkEt4sdcwWPZnCM5M",
        authDomain: "fuahtycoon.firebaseapp.com",
        projectId: "fuahtycoon",
        storageBucket: "fuahtycoon.firebasestorage.app",
        messagingSenderId: "507303452654",
        appId: "1:507303452654:web:75b6ec2cb33d05fa95b8ff"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let gameState = { 
        nickname: "", balance: 1000, income: 0, gridSize: 6, placedBuildings: {}, lastLogin: Date.now() 
    };
    let globalBuildings = {};

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(gameState.balance);
        document.getElementById('income').innerText = gameState.income;
        renderGrid();
    }

    function renderGrid() {
        const gridEl = document.getElementById('grid');
        const size = gameState.gridSize || 6;
        gridEl.style.gridTemplateColumns = `repeat(${size}, 55px)`;
        gridEl.innerHTML = '';
        for (let i = 0; i < size * size; i++) {
            const key = `${Math.floor(i / size)}-${i % size}`;
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (gameState.placedBuildings[key]) {
                const img = document.createElement('img');
                img.src = gameState.placedBuildings[key].img || '';
                cell.appendChild(img);
            }
            gridEl.appendChild(cell);
        }
    }

    // --- ПЕРЕВІРКА КНОПОК ПІСЛЯ ЗАВАНТАЖЕННЯ ---
    window.addEventListener('DOMContentLoaded', () => {
        console.log("Скрипт готовий!");

        const saveBtn = document.getElementById('btnSave');
        const loadBtn = document.getElementById('btnLoad');

        if (saveBtn) {
            saveBtn.onclick = function() {
                console.log("Натиснуто збереження");
                const nick = document.getElementById('userName').value;
                const code = document.getElementById('syncCode').value;

                if (!nick || !code) {
                    alert("Впиши нік і код!");
                    return;
                }

                gameState.nickname = nick;
                gameState.lastLogin = Date.now();

                set(ref(db, 'players/' + code), gameState)
                    .then(() => alert("Успішно збережено!"))
                    .catch(err => alert("Помилка Firebase: " + err.message));
            };
        }

        if (loadBtn) {
            loadBtn.onclick = async function() {
                console.log("Натиснуто завантаження");
                const code = document.getElementById('syncCode').value;
                if (!code) return alert("Введи код!");

                const snap = await get(ref(db, 'players/' + code));
                if (snap.exists()) {
                    const data = snap.val();
                    gameState = {
                        ...gameState,
                        ...data,
                        lastLogin: Date.now()
                    };
                    document.getElementById('userName').value = gameState.nickname;
                    updateUI();
                    alert("Завантажено!");
                } else {
                    alert("Код не знайдено!");
                }
            };
        }
    });

    onValue(ref(db, 'global_buildings'), (snap) => {
        globalBuildings = snap.val() || {};
        const shopEl = document.getElementById('shop');
        shopEl.innerHTML = '';
        for (let id in globalBuildings) {
            const b = globalBuildings[id];
            shopEl.innerHTML += `<div class="building-card">
                <img src="${b.img}" width="40"> 
                <b>${b.name}</b> (${b.price} FUAH)
            </div>`;
        }
    });

    updateUI();
</script>
</body>
</html>
