<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUAH Tycoon: Advanced Online</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .game-container { background: white; padding: 25px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 380px; }
        .stats { background: #fff9c4; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; border: 2px solid #fbc02d; }
        .shop-container { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .building-card { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: left; position: relative; }
        .buy-btn { background: #4caf50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px; }
        .buy-btn:disabled { background: #ccc; cursor: not-allowed; }
        .admin-panel { display: none; margin-top: 20px; padding: 15px; background: #ffebee; border: 2px dashed #f44336; border-radius: 12px; text-align: left; }
        .admin-panel input[type="text"], .admin-panel input[type="number"] { width: 90%; margin-bottom: 8px; padding: 5px; }
        .sync-section { margin-top: 20px; background: #e3f2fd; padding: 15px; border-radius: 12px; }
        .btn-blue { background: #2196f3; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .badge { background: #ff5722; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; position: absolute; top: 5px; right: 5px; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>FUAH Tycoon 🌐</h1>
        
        <div class="stats">
            Баланс: <span id="balance">1000</span> FUAH<br>
            Дохід: <span id="income">0</span> FUAH/день<br>
            <small>Швидкість часу: x<span id="timeMult">1.0</span></small>
        </div>

        <h3>Магазин</h3>
        <div id="shop" class="shop-container">Завантаження...</div>

        <div class="sync-section">
            <input type="text" id="syncCode" placeholder="Ваш код"> <br>
            <button class="btn-blue" id="btnSave">Зберегти</button>
            <button class="btn-blue" id="btnLoad">Завантажити</button>
        </div>

        <button id="adminTrigger" style="margin-top: 20px; opacity: 0.1; border: none; background: none; cursor: pointer;">Адмін</button>

        <div id="adminPanel" class="admin-panel">
            <h4>Панель Лахазавра 🦖</h4>
            <input type="text" id="newBuildName" placeholder="Назва">
            <input type="number" id="newBuildPrice" placeholder="Ціна">
            <input type="number" id="newBuildIncome" placeholder="Дохід (+)">
            <input type="number" id="newBuildTime" step="0.1" placeholder="Множник часу (напр. 0.5)" value="0">
            <label><input type="checkbox" id="isOneTime"> Одноразова</label>
            <button onclick="window.addNewBuilding()" style="width:100%; margin-top:10px;">Додати</button>
            <hr>
            <input type="text" id="targetCode" placeholder="Код гравця">
            <input type="number" id="amountChange" placeholder="FUAH +/-">
            <button onclick="window.editPlayerBalance()">Змінити баланс</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCd7p3gyOGqlQZsddgkEt4sdcwWPZnCM5M",
            authDomain: "fuahtycoon.firebaseapp.com",
            projectId: "fuahtycoon",
            storageBucket: "fuahtycoon.firebasestorage.app",
            messagingSenderId: "507303452654",
            appId: "1:507303452654:web:75b6ec2cb33d05fa95b8ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Стан гри (додано timeMultiplier та список куплених ID)
        let gameState = { 
            balance: 1000, 
            income: 0, 
            timeMultiplier: 1.0, 
            purchasedIds: [], 
            lastLogin: Date.now() 
        };
        let globalBuildings = {};

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(gameState.balance);
            document.getElementById('income').innerText = gameState.income;
            document.getElementById('timeMult').innerText = (1 / gameState.timeMultiplier).toFixed(1);
            renderShop();
        }

        function renderShop() {
            const shopEl = document.getElementById('shop');
            shopEl.innerHTML = '';
            
            for (let id in globalBuildings) {
                const b = globalBuildings[id];
                const isBought = gameState.purchasedIds && gameState.purchasedIds.includes(id);
                
                // Якщо одноразова і вже куплена - можна або приховати, або заблокувати
                if (b.isOneTime && isBought) continue; 

                const card = document.createElement('div');
                card.className = 'building-card';
                let info = b.income > 0 ? `+${b.income} FUAH/дн` : `Прискорює час`;
                if (b.isOneTime) card.innerHTML += `<span class="badge">1-разове</span>`;
                
                card.innerHTML += `<b>${b.name}</b><br>Ціна: ${b.price} | ${info}`;
                
                const btn = document.createElement('button');
                btn.className = 'buy-btn';
                btn.innerText = 'Купити';
                btn.onclick = () => buyBuilding(id, b);
                
                card.appendChild(btn);
                shopEl.appendChild(card);
            }
        }

        function buyBuilding(id, b) {
            if (gameState.balance >= b.price) {
                gameState.balance -= b.price;
                gameState.income += (b.income || 0);
                
                // Якщо є множник часу (наприклад, 0.1 - скорочує час на 10%)
                if (b.timeMultiplier > 0) {
                    // Формула: новий час = старий час * (1 - бонус)
                    // Тобто якщо множник 0.5, час між нарахуваннями скоротиться вдвічі
                    gameState.timeMultiplier -= b.timeMultiplier;
                    if (gameState.timeMultiplier < 0.1) gameState.timeMultiplier = 0.1; // Ліміт швидкості
                }

                if (b.isOneTime) {
                    if (!gameState.purchasedIds) gameState.purchasedIds = [];
                    gameState.purchasedIds.push(id);
                }

                updateUI();
            } else { alert("Не вистачає FUAH!"); }
        }

        // FIREBASE ЛОГІКА
        onValue(ref(db, 'global_buildings'), (snapshot) => {
            globalBuildings = snapshot.val() || {};
            renderShop();
        });

        window.saveGame = () => {
            const code = document.getElementById('syncCode').value;
            if (!code) return alert("Введіть код!");
            gameState.lastLogin = Date.now();
            set(ref(db, 'players/' + code), gameState).then(() => alert("Збережено!"));
        };

        window.loadGame = async () => {
            const code = document.getElementById('syncCode').value;
            const snap = await get(ref(db, 'players/' + code));
            if (snap.exists()) {
                const loaded = snap.val();
                const now = Date.now();
                
                // Важливо: множник часу впливає на швидкість отримання грошей
                // Тепер ділимо стандартний день на множник (якщо множник 0.5, гроші йдуть вдвічі швидше)
                const effectiveMsPerDay = (24 * 60 * 60 * 1000) * (loaded.timeMultiplier || 1);
                const days = (now - loaded.lastLogin) / effectiveMsPerDay;
                const earnings = Math.floor(days * loaded.income);
                
                gameState = loaded;
                if (!gameState.purchasedIds) gameState.purchasedIds = [];
                gameState.balance += earnings;
                gameState.lastLogin = now;
                updateUI();
                alert(`Вітаємо! Ви отримали ${earnings} FUAH за час офлайну.`);
            } else { alert("Код не знайдено!"); }
        };

        // АДМІНКА
        window.addNewBuilding = () => {
            const name = document.getElementById('newBuildName').value;
            const price = parseInt(document.getElementById('newBuildPrice').value);
            const income = parseInt(document.getElementById('newBuildIncome').value) || 0;
            const timeMult = parseFloat(document.getElementById('newBuildTime').value) || 0;
            const isOneTime = document.getElementById('isOneTime').checked;

            if (name && price) {
                const newId = "b_" + Date.now();
                set(ref(db, 'global_buildings/' + newId), { 
                    name, price, income, timeMultiplier: timeMult, isOneTime 
                });
                alert("Додано!");
            }
        };

        window.editPlayerBalance = async () => {
            const code = document.getElementById('targetCode').value;
            const amount = parseFloat(document.getElementById('amountChange').value);
            const pRef = ref(db, 'players/' + code);
            const snap = await get(pRef);
            if (snap.exists()) {
                let d = snap.val();
                d.balance += amount;
                update(pRef, { balance: d.balance });
                alert("Готово!");
            }
        };

        document.getElementById('btnSave').onclick = window.saveGame;
        document.getElementById('btnLoad').onclick = window.loadGame;
        document.getElementById('adminTrigger').onclick = () => {
            if(prompt("Код:") === "Lahazavr88@99") document.getElementById('adminPanel').style.display='block';
        };

        updateUI();
    </script>
</body>
</html>
